name: Update Futures Data
on:
  schedule:
    - cron: '30 1 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install requests
    - run: python fetch_futures.py
    - run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add data/futures.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update futures data"
        git push
